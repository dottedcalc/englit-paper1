# Publishes only the Vite output in dist/ (minified JS/CSS + index.html) — no src/ on Pages.
# Repo Settings → Pages → Build and deployment → Source: GitHub Actions.
#
# VITE_BASE (Vite public path):
# - Project site: https://<owner>.github.io/<repo>/  →  base must be /<repo>/
# - User/org site: https://<owner>.github.io/         →  repo is <owner>.github.io, base is /
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install and build
        env:
          # User/org root site: repo "<owner>.github.io" → "/". Else project page → "/<repo>/".
          VITE_BASE: ${{ github.event.repository.name == format('{0}.github.io', github.repository_owner) && '/' || format('/{0}/', github.event.repository.name) }}
        run: |
          npm ci
          npm run build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
